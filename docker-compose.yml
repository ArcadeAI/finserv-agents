services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: loanops-pg
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: loanops
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
